<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="routeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316" /> <stop offset="100%" stop-color="#C2410C" /> </linearGradient>
    
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="100" height="100" rx="16" fill="#0A0F1C" />

  <path d="M20 0 V100 M40 0 V100 M60 0 V100 M80 0 V100" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.03" />
  <path d="M0 20 H100 M0 40 H100 M0 60 H100 M0 80 H100" stroke="#FFFFFF" stroke-width="0.5" stroke-opacity="0.03" />

  <path d="M 80 30 
           L 30 30 
           L 30 70 
           L 80 70 
           L 80 50 
           L 55 50" 
        fill="none" 
        stroke="url(#routeGradient)" 
        stroke-width="10" 
        stroke-linecap="square" 
        stroke-linejoin="miter" />

  <rect x="75" y="25" width="10" height="10" fill="#10B981" filter="url(#neonGlow)" />
  
  <rect x="50" y="45" width="10" height="10" fill="#3B82F6" filter="url(#neonGlow)" />
</svg>
